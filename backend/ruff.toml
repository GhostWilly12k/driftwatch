line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line length handled by formatter/reviewer discretion
]

[lint.per-file-ignores]
"alembic/versions/*.py" = ["E501", "F401"]  # autogenerated migrations are noisy