<!-- ═══ performance.html ═══ -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Performance — CognitionTrade</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/shell.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><div class="page-title">My Performance</div><div class="date-chip">Fri, 20 Mar 2026</div></div>
    <div class="topbar-right"><button class="btn btn-ghost" data-action="logout">Sign Out</button></div>
  </div>
  <div class="content">
    <div class="grid-4">
      <div class="card metric"><div class="metric-label">Total Trades</div><div class="metric-value">342</div><div class="metric-sub">Since Jan 2025</div></div>
      <div class="card metric"><div class="metric-label">Winning Rate</div><div class="metric-value c-green">58.3%</div><div class="metric-sub">202 wins · 140 losses</div></div>
      <div class="card metric"><div class="metric-label">Profit Factor</div><div class="metric-value c-amber">1.74</div><div class="metric-sub">Gross profit-to-loss ratio</div></div>
      <div class="card metric"><div class="metric-label">Worst Drawdown</div><div class="metric-value c-red">−8.4R</div><div class="metric-sub">Feb 12–14</div></div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">Monthly Results (Risk Units)</div></div><div class="card-body"><div class="chart-wrap" style="height:280px;"><canvas id="monthlyChart"></canvas></div></div></div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/charts.js"></script>
<script>CT.auth.requireAuth();</script>
</body>
</html>
