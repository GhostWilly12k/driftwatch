<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade History — CognitionTrade</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/shell.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><div class="page-title">Trade History</div><div class="date-chip">Fri, 20 Mar 2026</div></div>
    <div class="topbar-right">
      <div class="ai-status"><span class="dot"></span>Agents active</div>
      <button class="btn btn-ghost">Export CSV</button>
      <a href="journal.html" class="btn btn-primary">+ Log a Trade</a>
      <button class="btn btn-ghost" data-action="logout">Sign Out</button>
    </div>
  </div>

  <div class="content" style="padding-bottom:40px;">
    <div class="card">
      <!-- Calendar Header -->
      <div class="cal-header">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calChangeMonth(-1)">&#8592;</button>
          <div class="cal-month-label" id="calMonthLabel">March 2026</div>
          <button class="cal-nav-btn" onclick="calChangeMonth(1)">&#8594;</button>
        </div>
        <div class="cal-legend">
          <span><span class="cal-legend-dot" style="background:rgba(0,212,170,0.5);"></span>Profitable</span>
          <span><span class="cal-legend-dot" style="background:rgba(255,71,87,0.5);"></span>Loss day</span>
          <span><span class="cal-legend-dot" style="background:rgba(255,184,0,0.4);"></span>Break-even</span>
          <span style="color:var(--text3);">Click a day to drill in</span>
        </div>
      </div>

      <!-- Summary Strip -->
      <div class="cal-summary-strip">
        <div class="strip-stat"><div class="strip-label">Total Trades</div><div class="strip-val" id="stripTrades">—</div></div>
        <div class="strip-stat"><div class="strip-label">Active Days</div><div class="strip-val" id="stripDays">—</div></div>
        <div class="strip-stat"><div class="strip-label">Month Result</div><div class="strip-val" id="stripPnl">—</div></div>
        <div class="strip-stat"><div class="strip-label">Win Rate</div><div class="strip-val" id="stripWin">—</div></div>
        <div class="strip-stat"><div class="strip-label">Best Day</div><div class="strip-val" id="stripBest" style="color:var(--green)">—</div></div>
      </div>

      <!-- Calendar Grid -->
      <div class="cal-grid-wrap">
        <div class="cal-weekdays">
          <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div><div class="cal-weekday">Tue</div>
          <div class="cal-weekday">Wed</div><div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div><div class="cal-weekday">Sat</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>

      <!-- Day Detail Drill-down -->
      <div class="day-detail hidden" id="dayDetail">
        <div class="day-detail-header">
          <div>
            <div class="day-detail-title" id="dayDetailTitle">—</div>
            <div class="day-detail-pills" id="dayDetailMeta"></div>
          </div>
          <button class="close-day-btn" onclick="closeDayDetail()">✕</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="trade-table" style="min-width:820px;">
            <thead>
              <tr><th>Time</th><th>Stock</th><th>Direction</th><th>Strategy</th><th>Entry</th><th>Exit</th><th>Outcome</th><th>Max Risk</th><th>Max Gain</th><th>Mindset</th></tr>
            </thead>
            <tbody id="dayDetailBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/calendar.js"></script>
<script>CT.auth.requireAuth();</script>
</body>
</html>
